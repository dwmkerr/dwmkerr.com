<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Mental Models (Grown)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  .mm-root {
    /* shape-type colour encoding, brightened to pop on dark */
    --mm-circle: #f24b3c;   /* bold red */
    --mm-triangle: #f5cf3a; /* yellow */
    --mm-square: #4c8dd6;   /* blue */
    --mm-edge: #cfd4da;     /* light neutral branches */
    --mm-stroke: #f4efe3;   /* near-white shape edges */
    background: #16191f;    /* matches conference deck --bg */
    min-height: 100vh;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 36px;
    font-family: 'Space Grotesk', system-ui, sans-serif;
  }
  .mm-root *, .mm-root *::before, .mm-root *::after { box-sizing: border-box; }
  .mm-row {
    display: flex;
    /* Keep all three clusters on one row at any container width. The slide
       container is narrower than 3 x 420px + gaps, so wrapping would push the
       third cluster to a second row and clip it off the slide. */
    flex-wrap: nowrap;
    justify-content: center;
    align-items: center;
    gap: 24px;
    width: 100%;
    max-width: 1380px;
  }
  .mm-tree {
    /* Share row equally, shrink to fit, never overflow. min-width:0 is
       required so flex items can actually shrink below their content width. */
    flex: 1 1 0;
    min-width: 0;
    max-width: 33%;
  }
  .mm-tree svg { display: block; width: 100%; height: auto; }
  /* thin light branch lines; thin near-white shape edges */
  .mm-edge { stroke: var(--mm-edge); fill: none; stroke-linecap: round; }
  .mm-shape { stroke: var(--mm-stroke); stroke-width: 1.1; stroke-linejoin: miter; }
  @media (max-width: 760px) { .mm-root { padding: 36px 16px; } .mm-row { gap: 16px; } }
</style>
</head>
<body>
<div class="mm-root">
  <div class="mm-row" id="mm-row"></div>
</div>
<script>
(function () {
  // ----- deterministic PRNG (mulberry32). Runtime Math.random is blocked. -----
  function rng(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // viewBox geometry. Square canvas so each model grows radially from centre.
  const VB = 460;
  const CX = VB / 2;
  const CY = VB / 2;
  const PAD = 16;             // keep outermost shapes inside the box
  const SHAPE_R = 6.2;        // small so the dense radial fractal stays readable

  function f(v) { return Math.round(v * 100) / 100; }

  // Build + place a radial-spiral fractal. Branches radiate from the centre in
  // all directions and recursively split, twisting (spiral) as they go outward.
  // Returns a flat list of nodes (with x/y/shape) and a list of edges.
  function grow(prng, cfg) {
    const nodes = [];
    const edges = [];

    // pick a shape type deterministically; root is always a circle.
    function pickShape(depth) {
      if (depth === 0) return 'circle';
      const r = prng();
      return r < 0.5 ? 'circle' : (r < 0.78 ? 'triangle' : 'square');
    }

    // root at centre
    const root = { x: CX, y: CY, depth: 0, shape: 'circle' };
    nodes.push(root);

    // initial ring of primary arms radiating outward in all directions
    const arms = cfg.arms;
    const armGap = (Math.PI * 2) / arms;
    // a deterministic phase offset so the three models start out of sync
    const phase = prng() * Math.PI * 2;

    function branch(parent, angle, len, depth) {
      if (depth > cfg.maxDepth) return;
      // segment length shrinks with depth; jitter keeps it organic
      const jLen = len * (1 + (prng() - 0.5) * cfg.lenJitter);
      const x = parent.x + Math.cos(angle) * jLen;
      const y = parent.y + Math.sin(angle) * jLen;

      // bail if we have wandered outside the usable canvas
      if (x < PAD || x > VB - PAD || y < PAD || y > VB - PAD) return;

      const node = { x: x, y: y, depth: depth, shape: pickShape(depth) };
      nodes.push(node);
      edges.push([parent.x, parent.y, x, y]);

      // decide how many children this node spawns. denser early, thinning out,
      // but with enough survival deep down to reach dozens/100+ nodes per model.
      let kids;
      const t = prng();
      if (depth >= cfg.maxDepth) {
        kids = 0;
      } else if (depth <= 1) {
        kids = 2 + (t < cfg.wide ? 1 : 0);     // 2 or 3 near the core
      } else {
        if (t < cfg.thin) kids = 1;
        else if (t < cfg.thin + cfg.mid) kids = 2;
        else if (t < cfg.thin + cfg.mid + cfg.fat) kids = 3;
        else kids = 0;                          // some branches just terminate
      }

      // spiral: rotate the outgoing direction by a per-model twist, plus a
      // spread between siblings, plus jitter so it reads chaotic not symmetric.
      const nextLen = jLen * cfg.shrink;
      const baseTwist = cfg.twist * (1 + (prng() - 0.5) * 0.5);
      for (let i = 0; i < kids; i++) {
        const spread = (i - (kids - 1) / 2) * cfg.spread;
        const wobble = (prng() - 0.5) * cfg.wobble;
        branch(node, angle + baseTwist + spread + wobble, nextLen, depth + 1);
      }
    }

    for (let a = 0; a < arms; a++) {
      const ang = phase + a * armGap + (prng() - 0.5) * cfg.armJitter;
      branch(root, ang, cfg.startLen, 1);
    }

    return { nodes, edges };
  }

  function shapeMarkup(n) {
    const x = n.x, y = n.y, r = SHAPE_R;
    if (n.shape === 'circle') {
      return `<circle class="mm-shape" cx="${f(x)}" cy="${f(y)}" r="${r}" fill="var(--mm-circle)"/>`;
    }
    if (n.shape === 'square') {
      const s = r * 1.78; // visually match circle area
      return `<rect class="mm-shape" x="${f(x - s / 2)}" y="${f(y - s / 2)}" width="${f(s)}" height="${f(s)}" fill="var(--mm-square)"/>`;
    }
    // upward triangle centred on the node
    const h = r * 2.0, w = r * 2.0;
    const top = `${f(x)},${f(y - h * 0.6)}`;
    const bl = `${f(x - w / 2)},${f(y + h * 0.4)}`;
    const br = `${f(x + w / 2)},${f(y + h * 0.4)}`;
    return `<polygon class="mm-shape" points="${top} ${bl} ${br}" fill="var(--mm-triangle)"/>`;
  }

  function render(model) {
    const edgeMarkup = model.edges.map(e =>
      `<line class="mm-edge" x1="${f(e[0])}" y1="${f(e[1])}" x2="${f(e[2])}" y2="${f(e[3])}" stroke-width="${model.edgeWidth}"/>`
    ).join('');
    const shapeMarkupAll = model.nodes.map(shapeMarkup).join('');
    return `<svg viewBox="0 0 ${VB} ${VB}" role="img" aria-label="grown radial mental-model">`
      + `<g>${edgeMarkup}</g>`
      + shapeMarkupAll
      + `</svg>`;
  }

  // Three models: same family/style, deliberately out of sync. They share the
  // SAME generative budget (arms, maxDepth, startLen, shrink, branch probs) so
  // all three end up with a comparable node count and visual density. Only the
  // *character* differs: spiral direction/twist, sibling spread, wobble, and
  // seed/phase. That keeps the three trees as peers, not big/big/small.
  const TARGET_NODES = null; // unused — equality is enforced via shared params
  const SHARED = {
    arms: 5,
    maxDepth: 7,
    startLen: 44,
    shrink: 0.83,
    lenJitter: 0.35,
    armJitter: 0.30,
    // branching distribution at depth >= 2 (must sum <= 1; remainder = terminate)
    wide: 0.40,   // chance of 3 kids at depth <= 1
    thin: 0.42,   // 1 kid
    mid:  0.40,   // 2 kids
    fat:  0.06    // 3 kids
  };
  // Seeds picked so each model lands at ~220 nodes (within ~1%). They are not
  // arbitrary — they were chosen by sampling and equalising. If you change the
  // shared params or twist/spread/wobble, re-sample seeds to keep parity.
  const configs = [
    // gentle right-handed spiral
    { seed: 4003, twist:  0.38, spread: 0.62, wobble: 0.50, edgeWidth: 1.05 },
    // tighter right-handed spiral, more sibling wobble
    { seed: 5455, twist:  0.62, spread: 0.50, wobble: 0.70, edgeWidth: 1.05 },
    // left-handed spiral, wider sibling spread
    { seed: 5796, twist: -0.46, spread: 0.74, wobble: 0.45, edgeWidth: 1.05 }
  ].map(c => Object.assign({}, SHARED, c));

  const row = document.getElementById('mm-row');
  configs.forEach(cfg => {
    const prng = rng(cfg.seed);
    const model = grow(prng, cfg);
    model.edgeWidth = cfg.edgeWidth;
    const div = document.createElement('div');
    div.className = 'mm-tree';
    div.innerHTML = render(model);
    row.appendChild(div);
  });
})();
</script>
</body>
</html>
