<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Building Evidence with Agents</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #0d1117;
  }

  .card {
    width: 1280px;
    height: 720px;
    display: flex;
    position: relative;
    background: radial-gradient(ellipse at 30% 45%, #111318 0%, #0d1117 80%);
  }

  .left {
    width: 55%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 40px 0 56px;
  }

  .title {
    font-size: 72px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.05;
    letter-spacing: -0.5px;
    margin-bottom: 22px;
  }

  .subtitle {
    font-size: 32px;
    font-weight: 500;
    color: #9da7b3;
    line-height: 1.28;
    margin-bottom: 34px;
  }

  .tagline {
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 15px;
    color: #484f58;
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  .divider {
    width: 2px;
    height: 100%;
    position: absolute;
    left: 55%;
    top: 0;
    background: linear-gradient(to bottom, transparent 8%, #39d353 25%, #39d353 75%, transparent 92%);
  }

  .right {
    width: 45%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 40px;
  }

  .terminal {
    width: 100%;
    background: #161b22;
    border-radius: 10px;
    border: 1px solid #30363d;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
  }

  .titlebar {
    display: flex;
    align-items: center;
    height: 34px;
    padding: 0 14px;
    background: #1c2129;
    border-bottom: 1px solid #30363d;
  }

  .dot { width: 11px; height: 11px; border-radius: 50%; margin-right: 7px; }
  .red { background: #ff5f57; }
  .yellow { background: #febc2e; }
  .green { background: #28c840; }

  .titletext {
    flex: 1;
    text-align: center;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 12px;
    color: #484f58;
    margin-right: 40px;
  }

  .body {
    padding: 20px 18px;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 16px;
    line-height: 1.85;
  }

  .line { white-space: nowrap; }
  .prompt { color: #39d353; }
  .cmd { color: #e6edf3; }
  .dim { color: #6e7681; }
  .ok { color: #39d353; }
  .accent { color: #d2a8ff; }
  .spacer { height: 8px; }
</style>
</head>
<body>
  <div class="card">
    <div class="left">
      <div class="title">Building Evidence<br>with Agents</div>
      <div class="subtitle">Tests aren't enough. Make the agent show you the thing working.</div>
      <div class="tagline">DWMKERR.COM</div>
    </div>
    <div class="divider"></div>
    <div class="right">
      <div class="terminal">
        <div class="titlebar">
          <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
          <span class="titletext">evidence</span>
        </div>
        <div class="body">
          <div class="line"><span class="prompt">$</span> <span class="cmd">ark okf export</span></div>
          <div class="line"><span class="ok">&#10003;</span> <span class="dim">exported 7 concepts</span></div>
          <div class="spacer"></div>
          <div class="line"><span class="prompt">$</span> <span class="cmd">claude -p</span> <span class="dim">"which agents run?"</span></div>
          <div class="line"><span class="accent">&#10003;</span> <span class="cmd">4 agents, model default</span></div>
          <div class="line"><span class="dim">&nbsp;&nbsp;cited agents/ark-operator.md</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
